            jq -r '.runs[].results[] | "| \(.ruleId) | \(if .level == "error" then "CRITICAL" else "HIGH" end) | \(.message.text | split("\n")[0] | gsub("[|]"; "\\|") | .[0:100]) |"' trivy-results.sarif >> $GITHUB_STEP_SUMMARY
