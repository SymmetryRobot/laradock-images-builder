name: Builder

on:
  schedule:
    - cron: "00 23 1 * *"
  workflow_dispatch:

env:
  PUSH: true
  IMAGE_NAMESPACE: ${{ vars.DOCKER_USERNAME }}
  DOCKER_BUILD_RECORD_UPLOAD: false

# permissions: {}

jobs:
  build-services-image:
    name: Build PHP${{ matrix.php-version }} ${{ matrix.services }} (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        php-version: ["8.1", "8.3", "8.4", "8.5"]
        services: ["workspace", "php-fpm", "php-worker"]
        platform: [linux/amd64, linux/arm64]
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            slug: "amd64"
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            slug: "arm64"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Docker hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAMESPACE }}/laradock-${{ matrix.services }}

      - name: clean disk
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Build and Push by Digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.services }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PHP_VERSION=${{ matrix.php-version }}
            http_proxy=
            https_proxy=
          # 關鍵設定：這裡一定要輸出 type=image 並且 push-by-digest=true
          # 這樣才不會互相覆蓋 Tag，而是產生獨立的 Manifest
          outputs: type=image,name=${{ env.IMAGE_NAMESPACE }}/laradock-${{ matrix.services }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=build-${{ matrix.services }}-php${{ matrix.php-version }}-${{ matrix.slug }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.services }}-php${{ matrix.php-version }}-${{ matrix.slug }}

      - name: Export Digest
        # 將產生的 Digest 存成檔案，供下一個 Merge Job 使用
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload Digest Artifact
        uses: actions/upload-artifact@v7
        with:
          name: digests-php${{ matrix.php-version }}-${{ matrix.services }}-${{ matrix.slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1
  # 合併 Image 並推送最終 Tag
  merge-services-image:
    name: Merge PHP${{ matrix.php-version }} ${{ matrix.services }} Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        php-version: ["8.1", "8.3", "8.4", "8.5"]
        services: ["workspace", "php-fpm", "php-worker"]
    needs: build-services-image
    steps:
      - name: Get current date
        id: date
        run: echo "today=$(TZ=Asia/Taipei date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Merge Manifest
        uses: ThanatosDi/merge-images-digests@v1
        with:
          image-name: ${{ env.IMAGE_NAMESPACE }}/laradock-${{ matrix.services }}
          artifact-pattern: digests-php${{ matrix.php-version }}-${{ matrix.services }}-*
          tags: |
            ${{ matrix.php-version }}
            ${{ matrix.php-version }}-latest
            ${{ matrix.php-version }}-${{ steps.date.outputs.today }}
          timezone: Asia/Taipei
          registry-username: ${{ vars.DOCKER_USERNAME }}
          registry-password: ${{ secrets.DOCKER_TOKEN }}

  build-nginx-image:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            slug: "amd64"
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            slug: "arm64"
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAMESPACE }}/laradock-nginx

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Docker hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push by Digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./nginx
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            http_proxy=
            https_proxy=
          # 關鍵設定：這裡一定要輸出 type=image 並且 push-by-digest=true
          # 這樣才不會互相覆蓋 Tag，而是產生獨立的 Manifest
          outputs: type=image,name=${{ env.IMAGE_NAMESPACE }}/laradock-nginx,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=build-nginx-${{ matrix.slug }}
          cache-to: type=gha,mode=max,scope=build-nginx-${{ matrix.slug }}

      - name: Export Digest
        # 將產生的 Digest 存成檔案，供下一個 Merge Job 使用
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload Digest Artifact
        uses: actions/upload-artifact@v7
        with:
          name: digests-nginx-${{ matrix.slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1
  # 合併 Image 並推送最終 Tag
  merge-nginx-image:
    name: Merge Nginx Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs: build-nginx-image
    steps:
      - name: Get current date
        id: date
        run: echo "today=$(TZ=Asia/Taipei date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Merge Manifest
        uses: ThanatosDi/merge-images-digests@v1
        with:
          image-name: ${{ env.IMAGE_NAMESPACE }}/laradock-nginx
          artifact-pattern: digests-nginx-*
          tags: |
            latest
            ${{ steps.date.outputs.today }}
          timezone: Asia/Taipei
          registry-username: ${{ vars.DOCKER_USERNAME }}
          registry-password: ${{ secrets.DOCKER_TOKEN }}

  build-laravel-echo-server-image:
    name: Build laravel-echo-server (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            slug: "amd64"
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            slug: "arm64"
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAMESPACE }}/laradock-laravel-echo-server

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Docker hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push by Digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./laravel-echo-server
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            http_proxy=
            https_proxy=
          # 關鍵設定：這裡一定要輸出 type=image 並且 push-by-digest=true
          # 這樣才不會互相覆蓋 Tag，而是產生獨立的 Manifest
          outputs: type=image,name=${{ env.IMAGE_NAMESPACE }}/laradock-laravel-echo-server,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=build-laravel-echo-server-${{ matrix.slug }}
          cache-to: type=gha,mode=max,scope=build-laravel-echo-server-${{ matrix.slug }}

      - name: Export Digest
        # 將產生的 Digest 存成檔案，供下一個 Merge Job 使用
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload Digest Artifact
        uses: actions/upload-artifact@v7
        with:
          name: digests-laravel-echo-server-${{ matrix.slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1
  # 合併 Image 並推送最終 Tag
  merge-laravel-echo-server-image:
    name: Merge laravel-echo-server Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs: build-laravel-echo-server-image
    steps:
      - name: Get current date
        id: date
        run: echo "today=$(TZ=Asia/Taipei date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Merge Manifest
        uses: ThanatosDi/merge-images-digests@v1
        with:
          image-name: ${{ env.IMAGE_NAMESPACE }}/laradock-laravel-echo-server
          artifact-pattern: digests-laravel-echo-server-*
          tags: |
            latest
            ${{ steps.date.outputs.today }}
          timezone: Asia/Taipei
          registry-username: ${{ vars.DOCKER_USERNAME }}
          registry-password: ${{ secrets.DOCKER_TOKEN }}
